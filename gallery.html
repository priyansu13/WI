<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Gallery</title>
    <meta
      name="description"
      content="Wedding gallery for the completed celebration."
    />
    <meta name="theme-color" content="#800020" />
    <link rel="stylesheet" href="style.css?v=20260503-3" />
  </head>
  <body>
    <main class="gallery-page">
      <section class="gallery-hero">
        <div class="visitor-count" aria-label="Visitor count">
          <span class="visitor-count__number" data-visitor-count>108</span>
          <span class="visitor-count__label">Visits</span>
        </div>
        <div class="hero-content">
          <h1>Wedding Gallery</h1>
        </div>
      </section>

      <section class="section">
        <div class="card-grid">
          <article class="card">
            <h3>Shagun Ceremony</h3>
            <a
              class="button"
              href="https://drive.google.com/drive/folders/19TjjIsKZkT5rnssreugnOnBPnM8pQJhI"
              target="_blank"
              rel="noreferrer"
            >
              Open
            </a>
          </article>

          <article class="card">
            <h3>Wedding Ceremony</h3>
            <a
              class="button"
              href="https://drive.google.com/drive/folders/19TjjIsKZkT5rnssreugnOnBPnM8pQJhI"
              target="_blank"
              rel="noreferrer"
            >
              Open
            </a>
          </article>
        </div>
      </section>
    </main>
    <script>
      (() => {
        const counter = document.querySelector("[data-visitor-count]");
        if (!counter) return;

        const storageKey = "wedding-gallery-visitor-count";
        const initialCount = Number(counter.textContent) || 108;

        try {
          const storedCount =
            Number(localStorage.getItem(storageKey)) || initialCount;
          const nextCount = Math.max(initialCount, storedCount) + 1;

          localStorage.setItem(storageKey, String(nextCount));
          counter.textContent = nextCount.toLocaleString("en-IN");
        } catch {
          counter.textContent = initialCount.toLocaleString("en-IN");
        }
      })();
    </script>
  </body>
</html>
